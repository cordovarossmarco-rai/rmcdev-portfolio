backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:

  - name: "settings"
    label: "⚙️ Site Settings"
    files:

      - name: "hero"
        label: "🏠 Hero Section"
        file: "data/hero.json"
        fields:
          - { label: "Status Badge (e.g. Available for new projects)", name: "status_badge", widget: "string" }
          - { label: "Your Full Name", name: "name", widget: "string" }
          - { label: "Hero Description", name: "description", widget: "text" }
          - { label: "Resume URL", name: "resume_url", widget: "string" }

      - name: "stats"
        label: "📊 Stats"
        file: "data/stats.json"
        fields:
          - label: "Stats"
            name: "items"
            widget: "list"
            fields:
              - { label: "Number", name: "number", widget: "number" }
              - { label: "Suffix (e.g. + or %)", name: "suffix", widget: "string" }
              - { label: "Label (use \\n for line break)", name: "label", widget: "string" }
              - { label: "Accent Color", name: "accent", widget: "select", options: ["green", "gold"] }

      - name: "contact"
        label: "📬 Contact Info"
        file: "data/contact.json"
        fields:
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string" }
          - { label: "Facebook URL", name: "facebook", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }

  - name: "projects"
    label: "🌐 CMS Projects"
    files:

      - name: "wix"
        label: "Wix Projects"
        file: "data/projects-wix.json"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            fields:
              - { label: "Site Name", name: "name", widget: "string" }
              - { label: "Live URL", name: "url", widget: "string" }
              - { label: "Tag (e.g. Wix · Healthcare)", name: "tag", widget: "string" }
              - { label: "Thumbnail Image", name: "img", widget: "image", required: false }

      - name: "webflow"
        label: "Webflow Projects"
        file: "data/projects-webflow.json"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            fields:
              - { label: "Site Name", name: "name", widget: "string" }
              - { label: "Live URL", name: "url", widget: "string" }
              - { label: "Tag (e.g. Webflow · Corporate)", name: "tag", widget: "string" }
              - { label: "Thumbnail Image", name: "img", widget: "image", required: false }

      - name: "shopify"
        label: "Shopify Projects"
        file: "data/projects-shopify.json"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            fields:
              - { label: "Site Name", name: "name", widget: "string" }
              - { label: "Live URL", name: "url", widget: "string" }
              - { label: "Tag (e.g. Shopify · eCommerce)", name: "tag", widget: "string" }
              - { label: "Thumbnail Image", name: "img", widget: "image", required: false }

      - name: "duda"
        label: "Duda Projects"
        file: "data/projects-duda.json"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            fields:
              - { label: "Site Name", name: "name", widget: "string" }
              - { label: "Live URL", name: "url", widget: "string" }
              - { label: "Tag (e.g. Duda · Home Services)", name: "tag", widget: "string" }
              - { label: "Thumbnail Image", name: "img", widget: "image", required: false }

  - name: "seo"
    label: "📈 SEO Before/After"
    files:
      - name: "seo_results"
        label: "SEO Results"
        file: "data/seo.json"
        fields:
          - label: "SEO Results"
            name: "items"
            widget: "list"
            fields:
              - { label: "Site Name", name: "site", widget: "string" }
              - { label: "Industry & Platform (e.g. Legal · Wix)", name: "industry", widget: "string" }
              - { label: "Score BEFORE (%)", name: "before", widget: "number" }
              - { label: "Score AFTER (%)", name: "after", widget: "number" }

  - name: "videos"
    label: "🎬 Video Projects"
    files:
      - name: "video_list"
        label: "Video List"
        file: "data/videos.json"
        fields:
          - label: "Videos"
            name: "items"
            widget: "list"
            fields:
              - { label: "Project Name", name: "name", widget: "string" }
              - { label: "Tag (e.g. Instagram Reels · eCommerce)", name: "tag", widget: "string" }
              - { label: "Short Note", name: "note", widget: "string" }
              - { label: "Thumbnail Image", name: "thumb", widget: "image", required: false }
              - label: "Video Platform"
                name: "video_platform"
                widget: "select"
                options:
                  - { label: "YouTube", value: "youtube" }
                  - { label: "Facebook", value: "facebook" }
                  - { label: "TikTok", value: "tiktok" }
                  - { label: "Direct Link (no embed)", value: "link" }
              - { label: "Video URL (full URL from YouTube / Facebook / TikTok)", name: "video_url", widget: "string" }

  - name: "email"
    label: "📧 Email Campaigns"
    files:
      - name: "email_list"
        label: "Email Campaign Designs"
        file: "data/email.json"
        fields:
          - label: "Campaigns"
            name: "items"
            widget: "list"
            fields:
              - { label: "Campaign Name", name: "name", widget: "string" }
              - { label: "Tag (e.g. Klaviyo · Automation)", name: "tag", widget: "string" }
              - { label: "Screenshot Image", name: "img", widget: "image", required: false }
              - label: "Tools Used"
                name: "tools"
                widget: "list"
                field: { label: "Tool", name: "tool", widget: "string" }

  - name: "experience"
    label: "💼 Work Experience"
    files:
      - name: "exp_list"
        label: "Experience"
        file: "data/experience.json"
        fields:
          - label: "Roles"
            name: "items"
            widget: "list"
            fields:
              - { label: "Number (e.g. 01)", name: "num", widget: "string" }
              - { label: "Job Title", name: "job", widget: "string" }
              - { label: "Company", name: "company", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Date Range", name: "date", widget: "string" }
              - label: "Bullet Points"
                name: "bullets"
                widget: "list"
                field: { label: "Bullet", name: "bullet", widget: "string" }
